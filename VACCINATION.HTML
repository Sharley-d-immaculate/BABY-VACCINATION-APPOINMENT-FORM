<!DOCTYPE html>
<html>
<head>
    <title>Baby Vaccination Form</title>

    <style>
        body {
            background-color: #e6f2ff;
            font-family: Arial, sans-serif;
        }

        .container {
            width: 380px;
            margin: 40px auto;
            padding: 20px;
            background-color: white;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.15);
        }

        h2 {
            text-align: center;
            color: #0066cc;
            margin-bottom: 15px;
        }

        label {
            color: #004080;
            font-weight: bold;
            display: block;
            margin-top: 10px;
            font-size: 14px;
        }

        input, select {
            width: 100%;
            padding: 6px;
            margin-top: 5px;
            border-radius: 5px;
            border: 1px solid #3399ff;
            font-size: 14px;
        }

        button {
            width: 100%;
            padding: 8px;
            margin-top: 15px;
            background-color: #0073e6;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 15px;
            cursor: pointer;
        }

        button:hover {
            background-color: #005bb5;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>Baby Vaccination Appointment</h2>

    <form>

        <!-- Baby Name -->
        <label>Baby Name</label>
        <input type="text" placeholder="Enter baby name" required>

        <!-- Parent Name -->
        <label>Father / Mother Name</label>
        <input type="text" placeholder="Enter parent name" required>

        <!-- Date of Birth -->
        <label>Date of Birth</label>
        <input type="date" required>

        <!-- Age -->
        <label>Baby's Age in Weeks</label>
        <select required>
            <option value="">Select Age</option>
            <option>At Birth</option>
            <option>6 Weeks</option>
            <option>10 Weeks</option>
            <option>14 Weeks</option>
            <option>9 Months (After 270 days)</option>
        </select>

        <!-- Vaccination -->
        <label>Select Vaccination</label>
        <select required>
            <option value="">Select Vaccine</option>

            <option>BCG</option>
            <option>Hep B</option>

            <option>Penta-1</option>
            <option>OPV-1</option>
            <option>Rota-1</option>

            <option>Penta-2</option>
            <option>OPV-2</option>
            <option>Rota-2</option>

            <option>Penta-3</option>
            <option>OPV-3</option>
            <option>IPV-2</option>
            <option>Rota-3</option>

            <option>MR 1st dose</option>
            <option>JE 1</option>
        </select>

        <!-- Submit -->
        <button type="submit">Submit</button>

    </form>
</div>

</body>
</html>

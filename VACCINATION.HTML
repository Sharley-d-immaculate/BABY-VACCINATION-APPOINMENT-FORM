<!DOCTYPE html>
<html>
<head>
    <title>Baby Vaccination Form</title>

    <style>
        body {
            background-color: #e6f2ff; /* light blue */
            font-family: Arial, sans-serif;
        }

        .container {
            width: 400px;
            margin: 40px auto;
            padding: 20px;
            background-color: white;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
        }

        h2 {
            text-align: center;
            color: #0066cc;
        }

        label {
            color: #004080;
            font-weight: bold;
        }

        input, select {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
            border: 1px solid #3399ff;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: #0073e6;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: #005bb5;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>Baby Vaccination Appointment</h2>

    <form>

        <!-- Baby Name -->
        <label>Baby Name</label>
        <input type="text" placeholder="Enter baby name" required>

        <!-- Parent Name -->
        <label>Father/Mother Name</label>
        <input type="text" placeholder="Enter parent name" required>

        <!-- DOB -->
        <label>Date of Birth</label>
        <input type="date" required>

        <!-- Age -->
        <label>Baby Age</label>
        <select required>
            <option value="">Select Age</option>
            <option>At Birth</option>
            <option>6 Weeks</option>
            <option>10 Weeks</option>
            <option>14 Weeks</option>
            <option>9 Months (After 270 days)</option>
        </select>

        <!-- Vaccine -->
        <label>Select Vaccine</label>
        <select required>
            <option value="">Select Vaccine</option>

            <!-- At Birth -->
            <option>BCG</option>
            <option>OPV Zero dose</option>
            <option>Hep B birth dose (within 24 hours)</option>

            <!-- 6 Weeks -->
            <option>Penta-1</option>
            <option>OPV-1</option>
            <option>Rota-1</option>

            <!-- 10 Weeks -->
            <option>Penta-2</option>
            <option>OPV-2</option>
            <option>Rota-2</option>

            <!-- 14 Weeks -->
            <option>14th week</option>
            <option>Penta-3</option>
            <option>OPV-3</option>
            <option>IPV-2</option>
            <option>Rota-3</option>

            <!-- 9 Months -->
            <option>MR 1st dose</option>
            <option>JE 1</option>

        </select>

        <!-- Submit -->
        <button type="submit">Submit</button>

    </form>
</div>

</body>
</html>
